<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sign in — Network Traffic Dashboard</title>
<style>
    :root {
        --bg: #0b0618;
        --card-bg: #161029;
        --card-border: rgba(168, 110, 247, 0.22);
        --accent: #38bdf8;
        --accent-2: #a855f7;
        --pink: #ec4899;
        --text: #ece7ff;
        --muted: #9a94bd;
        --none: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
        background-color: var(--bg);
        background-image:
            radial-gradient(ellipse 900px 500px at 5% -10%, rgba(168, 110, 247, 0.28), transparent 60%),
            radial-gradient(ellipse 900px 600px at 95% 10%, rgba(236, 72, 153, 0.18), transparent 60%);
        background-attachment: fixed;
        padding: 16px;
    }
    .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 32px;
        width: 100%;
        max-width: 340px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }
    h1 {
        margin: 0 0 4px 0;
        font-size: 1.3rem;
        background: linear-gradient(90deg, var(--accent-2), var(--pink), var(--accent));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }
    p.sub { margin: 0 0 20px 0; color: var(--muted); font-size: 0.88rem; }
    input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid var(--card-border);
        background: var(--bg);
        color: var(--text);
        font-size: 1rem;
        margin-bottom: 14px;
    }
    button {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: none;
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        color: white;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
    }
    .error {
        background: rgba(251, 113, 133, 0.12);
        border: 1px solid var(--none);
        color: #fecdd3;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 0.85rem;
        margin-bottom: 14px;
    }
</style>
</head>
<body>
    <div class="card">
        <h1>Network Traffic Dashboard</h1>
        <p class="sub">Enter the dashboard password to continue.</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post">
            <input type="hidden" name="next" value="{{ next }}">
            <input type="password" name="password" placeholder="Password" autofocus required>
            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
