<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Network Traffic Dashboard</title>
<script src="{{ url_for('static', filename='vendor/chart.min.js') }}"></script>
<style>
    :root {
        --bg: #f5f5f5;
        --card-bg: #ffffff;
        --accent: #3498db;
        --text: #2c3e50;
        --muted: #7f8c8d;
        --live: #2ecc71;
        --idle: #95a5a6;
        --none: #e74c3c;
    }
    * { box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 16px;
        background-color: var(--bg);
        color: var(--text);
    }
    .container { max-width: 1300px; margin: 0 auto; }
    header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
    }
    h1 { margin: 0; font-size: 1.6rem; }
    h2 { font-size: 1.2rem; margin: 0 0 12px 0; }
    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 999px;
        background: var(--card-bg);
        box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        font-weight: 600;
        font-size: 0.95rem;
    }
    .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--none);
    }
    .status-dot.live { background: var(--live); animation: pulse 2s infinite; }
    .status-dot.idle { background: var(--idle); }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.5); }
        70% { box-shadow: 0 0 0 8px rgba(46, 204, 113, 0); }
        100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
    }
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 16px;
        margin-bottom: 20px;
    }
    .stat-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 18px;
        border-radius: 10px;
        text-align: center;
    }
    .stat-card h3 { margin: 0; font-size: 13px; opacity: 0.9; font-weight: 500; }
    .stat-card p { margin: 8px 0 0 0; font-size: 28px; font-weight: bold; word-break: break-word; }
    .panel-grid {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) minmax(300px, 1.4fr);
        gap: 16px;
        margin-bottom: 20px;
    }
    @media (max-width: 800px) {
        .panel-grid { grid-template-columns: 1fr; }
    }
    .panel {
        background: var(--card-bg);
        border-radius: 10px;
        padding: 18px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.92rem; }
    th { color: var(--muted); font-weight: 600; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover, tr.clickable:active { background-color: #f0f4f8; }
    .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        color: white;
    }
    .badge.high { background: #e74c3c; }
    .badge.medium { background: #f39c12; }
    .badge.low { background: var(--accent); }
    .badge.zero { background: var(--idle); }
    .empty { color: var(--muted); font-style: italic; padding: 12px 0; }
    .run-detail { margin-top: 14px; padding-top: 14px; border-top: 1px solid #eee; }
    .run-detail a {
        display: inline-block;
        margin: 4px 8px 4px 0;
        padding: 8px 14px;
        border-radius: 6px;
        background: var(--accent);
        color: white;
        text-decoration: none;
        font-size: 0.9rem;
    }
    .alert-line { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    .updated-at { color: var(--muted); font-size: 0.85rem; }
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>Network Traffic Dashboard</h1>
        <div class="status-badge">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Connecting…</span>
        </div>
    </header>

    <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><h3>Packets</h3><p id="stat-packets">–</p></div>
        <div class="stat-card"><h3>Packets/sec</h3><p id="stat-pps">–</p></div>
        <div class="stat-card"><h3>Runtime</h3><p id="stat-runtime">–</p></div>
        <div class="stat-card"><h3>Interface</h3><p id="stat-interface">–</p></div>
    </div>

    <div class="panel-grid">
        <div class="panel">
            <h2>Protocol Distribution</h2>
            <div style="position: relative; height: 260px;">
                <canvas id="protocolChart"></canvas>
            </div>
        </div>
        <div class="panel">
            <h2>Top IPs &amp; Ports</h2>
            <div style="display:flex; gap: 20px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 140px;">
                    <table>
                        <thead><tr><th>IP</th><th>Packets</th></tr></thead>
                        <tbody id="top-ips-body"></tbody>
                    </table>
                </div>
                <div style="flex: 1; min-width: 140px;">
                    <table>
                        <thead><tr><th>Port</th><th>Packets</th></tr></thead>
                        <tbody id="top-ports-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>Run History</h2>
        <table>
            <thead>
                <tr><th>Run</th><th>Packets</th><th>Duration</th><th>Alerts</th></tr>
            </thead>
            <tbody id="runs-body"></tbody>
        </table>
        <div id="runs-empty" class="empty" style="display:none;">No completed runs yet.</div>
        <div id="run-detail" class="run-detail" style="display:none;"></div>
    </div>
</div>

<script>
const COMMON_PORTS = {
    80: "HTTP", 443: "HTTPS", 22: "SSH", 21: "FTP", 25: "SMTP",
    53: "DNS", 3389: "RDP", 3306: "MySQL", 5432: "PostgreSQL",
    27017: "MongoDB", 6379: "Redis"
};

let protocolChart = null;

function severityBadgeClass(severity) {
    return { HIGH: "high", MEDIUM: "medium", LOW: "low" }[severity] || "zero";
}

function fmtDuration(seconds) {
    seconds = seconds || 0;
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function updateProtocolChart(protocolStats) {
    const labels = Object.keys(protocolStats || {});
    const values = Object.values(protocolStats || {});

    if (!protocolChart) {
        const ctx = document.getElementById('protocolChart').getContext('2d');
        protocolChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#3498db', '#e74c3c', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#34495e']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
        });
    } else {
        protocolChart.data.labels = labels;
        protocolChart.data.datasets[0].data = values;
        protocolChart.update();
    }
}

function renderTopTable(tbodyId, entries, isPort) {
    const tbody = document.getElementById(tbodyId);
    tbody.innerHTML = '';
    (entries || []).slice(0, 10).forEach(([key, count]) => {
        const tr = document.createElement('tr');
        const label = isPort ? `${key} ${COMMON_PORTS[key] ? '(' + COMMON_PORTS[key] + ')' : ''}` : key;
        tr.innerHTML = `<td>${label}</td><td>${count}</td>`;
        tbody.appendChild(tr);
    });
}

async function pollLive() {
    try {
        const res = await fetch('/api/live');
        const data = await res.json();

        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        dot.className = 'status-dot';

        if (data.status === 'live') {
            dot.classList.add('live');
            text.textContent = `Live — capturing on ${data.interface || 'default'}`;
            document.getElementById('stat-packets').textContent = data.packet_count ?? '–';
            document.getElementById('stat-pps').textContent = data.packets_per_second ?? '–';
            document.getElementById('stat-runtime').textContent = fmtDuration(data.runtime_seconds);
            document.getElementById('stat-interface').textContent = data.interface || 'default';
            updateProtocolChart(data.protocol_stats);
            renderTopTable('top-ips-body', data.top_ips, false);
            renderTopTable('top-ports-body', data.top_ports, true);
        } else if (data.status === 'idle') {
            dot.classList.add('idle');
            text.textContent = 'Idle — showing last completed run';
            document.getElementById('stat-packets').textContent = data.total_packets ?? '–';
            document.getElementById('stat-pps').textContent = '–';
            document.getElementById('stat-runtime').textContent = fmtDuration(data.duration_seconds);
            document.getElementById('stat-interface').textContent = '–';
            updateProtocolChart(data.protocol_stats);
        } else {
            text.textContent = 'No capture data yet';
        }
    } catch (e) {
        document.getElementById('status-text').textContent = 'Connection error';
    }
}

async function showRunDetail(runId) {
    const panel = document.getElementById('run-detail');
    panel.style.display = 'block';
    panel.innerHTML = '<div class="empty">Loading…</div>';

    const res = await fetch(`/api/runs/${encodeURIComponent(runId)}`);
    if (!res.ok) {
        panel.innerHTML = '<div class="empty">Could not load run details.</div>';
        return;
    }
    const data = await res.json();

    let html = `<h2>Run ${data.run_id}</h2>`;
    if (data.has_html) {
        html += `<a href="/api/runs/${data.run_id}/report.html" target="_blank" rel="noopener">Open full report</a>`;
    }
    if (data.has_csv) {
        html += `<a href="/api/runs/${data.run_id}/traffic_data.csv">Download CSV</a>`;
    }

    if (data.alerts && data.alerts.length > 0) {
        html += '<h2 style="margin-top:16px;">Alerts</h2>';
        data.alerts.slice(-20).reverse().forEach(a => {
            html += `<div class="alert-line"><span class="badge ${severityBadgeClass(a.severity)}">${a.severity}</span> ${a.description}</div>`;
        });
    } else {
        html += '<div class="empty">No alerts for this run.</div>';
    }

    panel.innerHTML = html;
}

async function loadRuns() {
    const res = await fetch('/api/runs');
    const runs = await res.json();

    const tbody = document.getElementById('runs-body');
    const empty = document.getElementById('runs-empty');
    tbody.innerHTML = '';

    if (!runs.length) {
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    runs.forEach(run => {
        const tr = document.createElement('tr');
        tr.className = 'clickable';
        const alertBadge = run.alert_count > 0
            ? `<span class="badge high">${run.alert_count}</span>`
            : `<span class="badge zero">0</span>`;
        tr.innerHTML = `
            <td>${run.run_id}</td>
            <td>${run.total_packets}</td>
            <td>${fmtDuration(run.duration_seconds)}</td>
            <td>${alertBadge}</td>
        `;
        tr.addEventListener('click', () => showRunDetail(run.run_id));
        tbody.appendChild(tr);
    });
}

pollLive();
setInterval(pollLive, 1500);
loadRuns();
setInterval(loadRuns, 15000);
</script>
</body>
</html>
