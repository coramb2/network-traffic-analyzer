services:
  network-traffic-analyzer:
    build: .
    container_name: network-traffic-analyzer
    restart: unless-stopped

    # Bridge networking only sees the container's own virtual interface.
    # Host networking is required so the capture actually observes traffic
    # on your home server's real network interface.
    network_mode: host

    # Least privilege: drop every capability, then add back only the two
    # needed for raw packet capture (see Dockerfile for how the non-root
    # "analyzer" user is granted them via setcap).
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN

    environment:
      # Interface to capture on. Find yours on the host with `ip -brief link`.
      # Leave blank to let scapy pick its default interface.
      IFACE: "${IFACE:-}"
      # Seconds to capture per scheduled run.
      CAPTURE_DURATION: "${CAPTURE_DURATION:-300}"
      # Seconds between the start of one capture run and the next.
      INTERVAL_SECONDS: "${INTERVAL_SECONDS:-3600}"
      # How many past run directories to keep under ./reports.
      RETENTION_RUNS: "${RETENTION_RUNS:-24}"
      # Optional BPF filter, e.g. "tcp port 80 or tcp port 443".
      CAPTURE_FILTER: "${CAPTURE_FILTER:-}"
      # Set true to also save raw packets per run as traffic_capture.pcap
      # (openable in Wireshark/tcpdump). Off by default - full packet
      # bytes are much larger than the JSON/CSV summaries.
      CAPTURE_PCAP: "${CAPTURE_PCAP:-false}"
      # Set false to skip reverse-DNS lookups (no device-name suggestions).
      RESOLVE_HOSTNAMES: "${RESOLVE_HOSTNAMES:-true}"
      ALERT_STATE_PATH: /data/state/alert_state.json

    volumes:
      - ./reports:/data/reports
      # Allowlist rules managed from the dashboard; capture only ever
      # reads this to suppress matching alerts, so it's mounted read-only
      # here even though the file itself is group-writable.
      - ./data:/data/state:ro

    # Bound resource usage in case of a runaway capture.
    mem_limit: 512m
    pids_limit: 100

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: network-traffic-dashboard
    restart: unless-stopped

    # No packet-capture privileges needed: just reads report files and
    # serves HTTP, so it stays off host networking and gets no added
    # capabilities.
    environment:
      REPORTS_ROOT: /data/reports
      ALERT_STATE_PATH: /data/state/alert_state.json
      DEVICE_NAMES_PATH: /data/state/device_names.json
      # Required: the dashboard refuses to start without it (see webapp.py).
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD:?Set DASHBOARD_PASSWORD in your .env file}"
      # Optional but recommended: without it, a fresh random key is used
      # each start, which logs everyone out on every container restart.
      DASHBOARD_SECRET_KEY: "${DASHBOARD_SECRET_KEY:-}"

    volumes:
      - ./reports:/data/reports:ro
      # Read-write: the only state the dashboard writes - allowlist rules,
      # resolved-alert markers, and device names - not report data.
      - ./data:/data/state

    ports:
      - "${DASHBOARD_PORT:-8080}:8080"

    mem_limit: 256m
    pids_limit: 50
